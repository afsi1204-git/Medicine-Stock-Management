<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Stock Management</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
</head>
<body>
    <!-- Main Menu -->
    <div id="mainMenu" class="container active">
        <div class="menu-card">
            <h1 class="title">Medicine Stock Management</h1>
            <div class="menu-options">
                <button class="menu-btn" onclick="showPage('addStock')">
                    <span class="icon">➕</span>
                    <span>Add Stock</span>
                </button>
                <button class="menu-btn" onclick="showPage('billing')">
                    <span class="icon">🧾</span>
                    <span>Billing</span>
                </button>
                <button class="menu-btn" onclick="showPage('checkStock')">
                    <span class="icon">📊</span>
                    <span>Check Stock</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Add Stock Page -->
    <div id="addStock" class="container">
        <div class="page-card">
            <div class="page-header">
                <h2>Add Stock</h2>
                <button class="back-btn" onclick="showPage('mainMenu')">← Back</button>
            </div>
            <form id="addStockForm" class="form">
                <div class="form-group">
                    <label for="medicineName">Medicine Name *</label>
                    <input type="text" id="medicineName" required>
                </div>
                <div class="form-group">
                    <label for="expiryDate">Expiry Date *</label>
                    <input type="date" id="expiryDate" required>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity *</label>
                    <input type="number" id="quantity" min="1" required>
                </div>
                <div class="form-group">
                    <label for="price">Price per Unit (₹) *</label>
                    <input type="number" id="price" min="0" step="0.01" required>
                </div>
                <button type="submit" class="submit-btn">Add/Update Stock</button>
            </form>
            <div id="addStockMessage" class="message"></div>
        </div>
    </div>

    <!-- Billing Page -->
    <div id="billing" class="container">
        <div class="page-card">
            <div class="page-header">
                <h2>Billing</h2>
                <button class="back-btn" onclick="showPage('mainMenu')">← Back</button>
            </div>
            <div class="billing-section">
                <div class="form-group">
                    <label for="billingMedicine">Select Medicine *</label>
                    <select id="billingMedicine" required>
                        <option value="">-- Select Medicine --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="billingQuantity">Quantity *</label>
                    <input type="number" id="billingQuantity" min="1" required>
                </div>
                <div class="form-group">
                    <label>Available Stock: <span id="availableStock">0</span></label>
                </div>
                <div class="form-group">
                    <label>Price per Unit: ₹<span id="unitPrice">0.00</span></label>
                </div>
                <div class="form-group">
                    <label>Total Amount: ₹<span id="totalAmount">0.00</span></label>
                </div>
                <button onclick="addToBill()" class="submit-btn">Add to Bill</button>
            </div>
            <div class="bill-items">
                <h3>Bill Items</h3>
                <div id="billItemsList"></div>
                <div class="bill-total">
                    <strong>Grand Total: ₹<span id="grandTotal">0.00</span></strong>
                </div>
                <button onclick="processBill()" class="submit-btn" id="processBillBtn" style="display:none;">Process Bill</button>
            </div>
            <div id="billingMessage" class="message"></div>
        </div>
    </div>

    <!-- Check Stock Page -->
    <div id="checkStock" class="container">
        <div class="page-card">
            <div class="page-header">
                <h2>Check Stock</h2>
                <button class="back-btn" onclick="showPage('mainMenu')">← Back</button>
            </div>
            <div class="search-section">
                <div class="form-group">
                    <label for="searchMedicine">Search Medicine</label>
                    <input type="text" id="searchMedicine" placeholder="Enter medicine name...">
                </div>
            </div>
            <div class="stock-table-container">
                <table class="stock-table">
                    <thead>
                        <tr>
                            <th>Medicine Name</th>
                            <th>Expiry Date</th>
                            <th>Quantity</th>
                            <th>Price per Unit</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody">
                    </tbody>
                </table>
            </div>
            <div id="checkStockMessage" class="message"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
